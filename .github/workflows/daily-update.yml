name: Daily Report Update

on:
  schedule:
    # 每天 8:00, 12:00, 18:00 北京时间自动运行
    - cron: "0 0 * * *"     # UTC 0:00 = 北京时间 8:00
    - cron: "0 4 * * *"     # UTC 4:00 = 北京时间 12:00
    - cron: "0 10 * * *"   # UTC 10:00 = 北京时间 18:00
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
          
      - name: Download latest report
        run: |
          # 从原版 TrendRadar 仓库下载最新生成的报告
          REPORT_URL="https://raw.githubusercontent.com/sansan0/TrendRadar/main/index.html"
          wget -q -O index.html $REPORT_URL || curl -s -o index.html $REPORT_URL
          
          # 下载 output 目录
          mkdir -p output
          wget -q -O output/hot.json https://raw.githubusercontent.com/sansan0/TrendRadar/main/output/hot.json || true
          ls -la
          
      - name: Commit and push report
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html output/ -f
          git commit -m "Update report $(date +%Y-%m-%d\ %H:%M)" || true
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
